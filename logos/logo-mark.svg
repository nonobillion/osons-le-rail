<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Osons le Rail">
  <defs>
    <clipPath id="c"><circle cx="32" cy="32" r="30"/></clipPath>
  </defs>
  <!-- badge -->
  <circle cx="32" cy="32" r="30" fill="#0a2540"/>
  <g clip-path="url(#c)">
    <!-- sky glow -->
    <circle cx="32" cy="24" r="11" fill="#e0a100" opacity="0.95"/>
    <!-- ground -->
    <rect x="0" y="40" width="64" height="24" fill="#0e8f6e"/>
    <!-- rails converging to horizon -->
    <path d="M26 24 L10 62 L17 62 L30 24 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M38 24 L54 62 L47 62 L34 24 Z" fill="#ffffff" opacity="0.95"/>
    <!-- sleepers (ties) -->
    <g fill="#0a2540">
      <rect x="27" y="29" width="10" height="2.4" rx="1"/>
      <rect x="25" y="36" width="14" height="2.8" rx="1"/>
      <rect x="22.5" y="44" width="19" height="3.2" rx="1"/>
      <rect x="19.5" y="53" width="25" height="3.6" rx="1"/>
    </g>
  </g>
  <!-- ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0e8f6e" stroke-width="4"/>
</svg>
